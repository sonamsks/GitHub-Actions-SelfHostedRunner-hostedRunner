name: GitHub Actions self hosted runner

on: [push]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
      - name: Verify Python & Pip
        run:
          python3 --version
      - name: install pip
        run: python3 -m ensurepip --upgrade

      - name: Install dependencies
        run: 
          python3 -m pip install pytest

      - name: Run tests
        run:
          cd src
          python3 -m pytest addition.py
